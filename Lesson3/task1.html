<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/task1.css">
    <title>Task 1</title>
</head>
<body>
    <div class="wrapper">
        <h1 class="title">Seasons</h1>

        <ul class="main_list">
            <li>
                Winter
                <ul class="season" id="winter">
                    <li class="mounth">December</li>
                    <li class="mounth">January</li>
                    <li class="mounth">February</li>
                </ul>
            </li>
            <li>
                Spring
                <ul class="season" id="spring">
                    <li class="mounth">March</li>
                    <li class="mounth">April</li>
                    <li class="mounth">May</li>
                </ul>
            </li>
            <li>
                Summer
                <ul class="season" id="summer">
                    <li class="mounth">June</li>
                    <li class="mounth">July</li>
                    <li class="mounth">August</li>
                </ul>
            </li>
            <li>
                Autumn
                <ul class="season" id="autumn">
                    <li class="mounth">September</li>
                    <li class="mounth">October</li>
                    <li class="mounth">November</li>
                </ul>
            </li>
        </ul>
    </div>
</body>
</html>
