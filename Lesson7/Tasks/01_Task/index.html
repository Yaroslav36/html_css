<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>z-index property in perspective</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="wrapper">
    <div class="pos pos1">z-index: -1</div>
    <div class="pos pos2">z-index: auto;</div>
    <div class="pos pos3">z-index: 1</div>
    <div class="pos pos4">z-index: 2</div>
</div>
</body></html>
