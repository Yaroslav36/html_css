<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header class="header">
        <nav class="navbar bg-body-tertiary wrapper py-3">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="#">
                    <img src="img/ad.png" alt="Logo" width="30" height="30" class="d-inline-block">
                    <span>AD'S BOARD</span>
                </a>
                <div class="d-flex align-items-center gap-3">
                    <button type="button" class="btn btn-warning fw-semibold new_ad">+ New ad</button>
                    <a href="#" class="person d-flex align-items-center gap-2 text-decoration-none">
                        <img src="img/av_64.png" alt="Avatar" class="rounded-circle" width="40" height="40"
                            style="object-fit: cover;">
                        <span class="text-primary fw-medium">My profile</span>
                    </a>
                </div>

            </div>
        </nav>
    </header>

    <main class="main wrapper my-4">
        <div class="search-box mb-4 bg-info-subtle">
            <div class="row g-2">
                <div class="col-md-5">
                    <input type="text" class="form-control" placeholder="11 999 345 ads near you">
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Kiev, Kiev area">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100">
                        Search
                    </button>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-3">
                <div class="category">
                    <i class="fa-solid fa-baby text-dark"></i>
                    Child's world
                </div>
                <div class="category">
                    <i class="fa-solid fa-id-badge text-success"></i>
                    Job
                </div>
                <div class="category">
                    <i class="fa-solid fa-wrench text-info"></i>
                    Business & services
                </div>
                <div class="category">
                    <i class="fa-solid fa-rotate text-warning"></i>
                    Exchange
                </div>
            </div>
            <div class="col-md-3">
                <div class="category">
                    <i class="fa-solid fa-house text-info"></i>
                    The property
                </div>
                <div class="category">
                    <i class="fa-solid fa-paw text-secondary"></i>
                    Animals
                </div>
                <div class="category">
                    <i class="fa-solid fa-shirt text-danger"></i>
                    Fashion & style
                </div>
            </div>
            <div class="col-md-3">
                <div class="category">
                    <i class="fa-solid fa-car text-warning"></i>
                    Transport
                </div>
                <div class="category">
                    <i class="fa-solid fa-couch text-primary"></i>
                    House & garden
                </div>
                <div class="category">
                    <i class="fa-solid fa-bicycle text-warning"></i>
                    Hobbies, recreation & sports
                </div>
            </div>
            <div class="col-md-3">
                <div class="category">
                    <i class="fa-solid fa-gears text-danger"></i>
                    Spare parts for transport
                </div>
                <div class="category">
                    <i class="fa-solid fa-mobile-screen text-success"></i>
                    Electronics
                </div>
                <div class="category">
                    <i class="fa-solid fa-gift text-primary"></i>
                    Gifts
                </div>
            </div>
        </div>
    </main>    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
